user nginx;
worker_processes 1;

events {
  worker_connections 1024;
}

error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

http {
  include /etc/nginx/mime.types;
  default_type application/octet-stream;

  server_tokens off;

  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
  '$status $body_bytes_sent "$http_referer" '
  '"$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/bokken.io.log;
  error_log /var/log/nginx/bokken.io.error.log;
  sendfile on;
  tcp_nopush on;
  keepalive_timeout 65;
  gzip on;
  gzip_types
  application/atom+xml
  application/javascript
  application/json
  application/ld+json
  application/manifest+json
  application/rss+xml
  application/vnd.geo+json
  application/vnd.ms-fontobject
  application/x-font-ttf
  application/x-web-app-manifest+json
  application/xhtml+xml
  application/xml
  font/opentype
  image/bmp
  image/svg+xml
  image/x-icon
  text/cache-manifest
  text/css
  text/plain
  text/vcard
  text/vnd.rim.location.xloc
  text/vtt
  text/x-component
  text/x-cross-domain-policy;

  add_header X-Frame-Options SAMEORIGIN;
  add_header X-Content-Type-Options nosniff;
  add_header X-XSS-Protection "1; mode=block";
  add_header Strict-Transport-Security "max-age=31536000; includeSubdomains";

  server {
    listen 8080 default_server;
    server_name www.bokken.io bokken.io;
    root /usr/share/nginx/html/blog.bokken.io;
    include common_assets.conf;

    location = / {
      try_files /about/index.html =404;
    }

    location = /privacy-policy.html {
      try_files /privacy-policy/index.html =404;
    }
  }

  server {
    listen 8080;
    server_name x.bokken.io;
    root /usr/share/nginx/html/x.bokken.io;
    include common_assets.conf;

    location = / {
      root /usr/share/nginx/html/blog.bokken.io;
      try_files /lab/index.html =404;
    }

    location = /maru.svg { root /usr/share/nginx/html/blog.bokken.io; }
    location = /maru.jpg { root /usr/share/nginx/html/blog.bokken.io; }
    location /_astro/ { root /usr/share/nginx/html/blog.bokken.io; }

    location / {
    }

    location ~ ^/clear-site-data/(.*)$ {
        etag off;
        add_header 'Clear-Site-Data' '"$1"';
        return 200;
    }

    location ~ ^/example-coep(/|/index\.html)?$ {
      root /usr/share/nginx/html/blog.bokken.io;
      try_files /lab/example-coep/index.html =404;
      add_header 'Cross-Origin-Embedder-Policy' 'require-corp';
      add_header 'Cross-Origin-Resource-Policy' 'same-origin';
      add_header 'X-Test-Foo' 'same-origin';
    }

    location ~ ^/(example-[^/]+|too-heavy-image-page)(/|/index\.html)?$ {
      root /usr/share/nginx/html/blog.bokken.io;
      try_files /lab/$1/index.html =404;
    }
  }

  server {
    listen 8080;
    server_name blog.bokken.io;
    root /usr/share/nginx/html/blog.bokken.io;
    include common_assets.conf;

    location / {
      index index.html;
      try_files $uri $uri/index.html =404;
    }
  }
}
