name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.26.2

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install
        env:
          HUSKY: 0

      - name: Format Check
        run: pnpm exec prettier --check .

      - name: Type Check (Astro)
        run: |
          pnpm --filter astro exec astro check
          pnpm --filter astro exec tsc --noEmit

      - name: Build Astro
        run: pnpm --filter astro build
