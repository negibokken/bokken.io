services:
  https-portal:
    image: steveltn/https-portal:1.12
    ports:
      - "80:80"
      - "443:443"
    links:
      - "bokken.io"
      - "cms_server"
    restart: always
    depends_on:
      - bokken.io
      - cms_server
    environment:
      DOMAINS: "bokken.io -> http://bokken.io:8080, www.bokken.io -> http://bokken.io:8080, blog.bokken.io -> http://bokken.io:8080, x.bokken.io -> http://bokken.io:8080, cms.bokken.io -> http://cms_server:3000"
      STAGE: production
      ERROR_LOG: default
      ACCESS_LOG: default
    volumes:
      - /var/log/nginx:/var/log/nginx

  bokken.io:
    image: bokken.io
    build:
      context: ..
      dockerfile: docker/Dockerfile
    volumes:
      - /var/log/nginx:/var/log/nginx

  cms_server:
    image: cms.bokken.io
    build:
      context: ..
      dockerfile: docker/Dockerfile.cms
    env_file:
      - ../.env
    environment:
      GITHUB_CALLBACK_URL: https://cms.bokken.io/api/auth/github/callback
      GITHUB_REPO_OWNER: negibokken
      GITHUB_REPO_NAME: bokken.io
      ALLOWED_GITHUB_USER: negibokken
      PORT: 3000
    restart: always
